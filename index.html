<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday Yasmin 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#ff4fa1,#7b61ff,#4fc3ff);
background-size:400% 400%;
animation:bg 12s infinite alternate;
color:white;
text-align:center;
overflow-x:hidden;
min-height:100vh;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.gallery{

width:260px;
height:260px;
object-fit:cover;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.35);

transition:.4s;

cursor:pointer;

}

.gallery:hover{

transform:scale(1.08) rotate(2deg);

box-shadow:0 25px 50px rgba(0,0,0,.5);

}
  
0%{background-position:left;}
100%{background-position:right;}
}

.fade{

animation:fade .8s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}
  .heart{
position:fixed;
top:-50px;
font-size:30px;
pointer-events:none;
animation:fall linear forwards;
z-index:9999;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}
</style>

</head>

<body>

<div id="login">

<div style="max-width:420px;margin:120px auto;background:rgba(255,255,255,.15);padding:30px;border-radius:25px;backdrop-filter:blur(15px);">

<h2>🎁 مفاجأة لياسمين 🎁</h2>

<p>أدخلي تاريخ ميلادك</p>

<input id="pass"
placeholder="20/07/2007"
style="width:100%;padding:15px;font-size:22px;text-align:center;border-radius:12px;border:none;">

<br><br>

<button onclick="check()"
style="padding:15px 40px;border:none;border-radius:12px;background:#ff2d75;color:#fff;font-size:22px;">
دخول
</button>

<p id="error"></p>

</div>

</div>

<div id="site" style="display:none;">

<div style="padding:40px;">

<img
src="IMG_1610.png"
style="width:220px;height:220px;border-radius:50%;border:6px solid #fff;object-fit:cover;box-shadow:0 15px 40px rgba(0,0,0,.4);">


<h2 style="margin-top:15px;">
20 / 07 / 2007 ❤️
</h2>

<p style="font-size:22px;line-height:2;margin-top:30px;max-width:700px;margin-left:auto;margin-right:auto;">
أتمنى لك سنة مليئة بالسعادة والنجاح وتحقيق كل أحلامك،
وربنا يحفظك ويفرح قلبك دائمًا.
🌹❤️
</p>

<div style="
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:40px;
">

<img src="./IMG_1610.png" class="gallery">

<img src="./IMG_1609.png" class="gallery">

<img src="./IMG_1615.png" class="gallery">

<img src="./IMG_1616.png" class="gallery">
</div>

</div>

</div>
  
 <h1 style="
margin-top:60px;
font-size:45px;
font-weight:900;
text-shadow:0 0 20px rgba(255,255,255,.5);
">
🎂 كل سنة وإنتِ طيبة يا ياسمين 🎂
</h1>
</div>

</div>


<script>

function check(){

let p=document.getElementById("pass").value
.replace(/\s/g,"")
.replace(/-/g,"/")
.replace(/\./g,"/");

if(p=="20/7/2007"||p=="20/07/2007"){

document.getElementById("login").style.display="none";
let site=document.getElementById("site");

site.style.display="block";

site.classList.add("fade");

  hearts();

}else{

document.getElementById("error").innerHTML="❌ الرقم السري غير صحيح";

}

}
function hearts(){

setInterval(function(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=["❤️","🌹","💖","🌸"][Math.floor(Math.random()*4)];

h.style.left=Math.random()*100+"%";

h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(function(){

h.remove();

},8000);

},400);

}
</script>

</body>
  
</html>
